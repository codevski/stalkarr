root = "."
tmp_dir = "tmp"
[build]
  cmd = "go build -o ./tmp/sleeparr ./cmd/server"
  bin = "./tmp/sleeparr"
  full_bin = "DATA_DIR=./config ./tmp/sleeparr"
  delay = 1000
  exclude_dir = ["frontend", "tmp", "data", "internal/static/dist"]
  include_ext = ["go"]
  kill_delay = "0s"
  rerun_delay = 500
[log]
  time = false
[misc]
  clean_on_exit = true
