services:
  stalkarr:
    image: ghcr.io/codevski/stalkarr:latest
    container_name: stalkarr
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./config:/config
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-generate-with-openssl-rand-hex-32}
      - GIN_MODE=${GIN_MODE:-release}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    env_file:
      - .env
